<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#111111" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Ops Report" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/assets/app-icon-192.png" />
    <title>{% block title %}Operations Report{% endblock %}</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #05070b;
        --bg-2: #090c12;
        --surface: rgba(12, 15, 22, 0.9);
        --surface-2: rgba(16, 20, 29, 0.95);
        --surface-3: rgba(22, 28, 39, 0.97);
        --surface-hero: linear-gradient(180deg, rgba(13, 17, 25, 0.97), rgba(7, 9, 14, 0.99));
        --text: #f3f5f8;
        --muted: #9aa5b5;
        --muted-2: #6f7b8f;
        --line: rgba(255, 255, 255, 0.07);
        --line-strong: rgba(255, 255, 255, 0.12);
        --accent: #5560c9;
        --accent-2: #7c89ee;
        --accent-soft: rgba(85, 96, 201, 0.12);
        --good: #74be99;
        --good-soft: rgba(116, 190, 153, 0.12);
        --warn: #cfb074;
        --warn-soft: rgba(207, 176, 116, 0.12);
        --bad: #d59191;
        --bad-soft: rgba(213, 145, 145, 0.12);
        --shadow-1: 0 0 0 1px rgba(255, 255, 255, 0.05);
        --shadow-2: 0 16px 38px rgba(0, 0, 0, 0.26);
        --shadow-3: 0 28px 64px rgba(0, 0, 0, 0.34);
        --radius-sm: 10px;
        --radius-md: 14px;
        --radius-lg: 20px;
        --radius-xl: 26px;
        --space-1: 6px;
        --space-2: 10px;
        --space-3: 14px;
        --space-4: 18px;
        --space-5: 24px;
        --space-6: 32px;
        --space-7: 42px;
        --space-8: 56px;
        --reading: 1240px;
      }

      * { box-sizing: border-box; }

      html {
        background:
          radial-gradient(circle at top left, rgba(85, 96, 201, 0.1), transparent 20%),
          radial-gradient(circle at top right, rgba(255, 255, 255, 0.03), transparent 18%),
          linear-gradient(180deg, #080a0f 0%, #040509 100%);
        min-height: 100%;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: transparent;
        letter-spacing: -0.012em;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
          radial-gradient(circle at 12% 10%, rgba(85, 96, 201, 0.05), transparent 16%),
          radial-gradient(circle at 88% 0%, rgba(255, 255, 255, 0.025), transparent 18%);
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.6;
      }

      h1, h2, h3 {
        margin: 0;
        color: var(--text);
      }

      h1 {
        font-size: clamp(2.4rem, 4.3vw, 4.5rem);
        line-height: 0.94;
        letter-spacing: -0.06em;
        font-weight: 650;
      }

      h2 {
        font-size: clamp(1.3rem, 2vw, 1.85rem);
        line-height: 1.02;
        letter-spacing: -0.045em;
        font-weight: 630;
      }

      h3 {
        font-size: 1rem;
        line-height: 1.08;
        letter-spacing: -0.025em;
        font-weight: 620;
      }

      strong {
        color: var(--text);
      }

      label {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--text);
        font-weight: 600;
      }

      .shell {
        min-height: 100vh;
        padding: 28px;
      }

      .app-frame {
        width: min(100%, var(--reading));
        margin: 0 auto;
        display: grid;
        gap: var(--space-5);
      }

      .app-topbar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: var(--space-4);
        padding: 12px 14px;
        border-radius: 18px;
        background: linear-gradient(180deg, rgba(11, 14, 20, 0.94), rgba(8, 10, 15, 0.98));
        border: 1px solid rgba(255, 255, 255, 0.06);
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.22);
        backdrop-filter: blur(12px);
      }

      .brand-lockup {
        display: grid;
        gap: 4px;
      }

      .brand-lockup__title {
        color: var(--text);
        font-size: 0.92rem;
        font-weight: 630;
        letter-spacing: -0.03em;
      }

      .brand-lockup__meta {
        color: var(--muted-2);
        font-size: 0.71rem;
        text-transform: uppercase;
        letter-spacing: 0.18em;
      }

      .topbar-meta {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: flex-end;
        gap: 8px;
      }

      .meta-chip,
      .status-pill,
      .tone-pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 28px;
        padding: 0 10px;
        border-radius: 999px;
        border: 1px solid var(--line);
        font-size: 0.72rem;
        font-weight: 750;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        background: rgba(255, 255, 255, 0.02);
        color: var(--text);
      }

      .meta-chip--accent { background: rgba(211, 47, 47, 0.18); color: #ffb3b3; border-color: rgba(211, 47, 47, 0.34); }
      .meta-chip--good { background: var(--good-soft); color: #b6efcb; }
      .meta-chip--warning { background: var(--warn-soft); color: #ffe2a8; }
      .meta-chip--subtle { color: var(--muted); }

      .install-shell {
        position: sticky;
        top: 10px;
        z-index: 20;
        display: none;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 14px 16px;
        margin: 0 auto 18px;
        width: min(100%, var(--reading));
        border-radius: 18px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: linear-gradient(180deg, rgba(39, 39, 39, 0.97), rgba(18, 18, 18, 0.99));
        box-shadow: 0 20px 44px rgba(0, 0, 0, 0.34);
      }

      .install-shell.is-visible {
        display: flex;
      }

      .install-shell__copy {
        display: grid;
        gap: 4px;
      }

      .install-shell__eyebrow {
        color: #ffb3b3;
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .install-shell__title {
        color: var(--text);
        font-size: 0.98rem;
        font-weight: 700;
      }

      .install-shell__meta {
        color: var(--muted);
        font-size: 0.88rem;
      }

      .install-shell__button {
        flex: 0 0 auto;
      }

      .hero-card,
      .card,
      .question-block,
      .assignment-card,
      .kpi-card,
      .module-card,
      .status-card,
      .priority-panel,
      .signal-card,
      .memo-card,
      .summary-card,
      .control-strip,
      .command-band,
      .milwaukee-spine__panel {
        background: var(--surface);
        border: 1px solid var(--line);
        box-shadow: var(--shadow-1), var(--shadow-2);
        backdrop-filter: blur(16px);
      }

      .hero-card,
      .card {
        border-radius: var(--radius-xl);
      }

      .card {
        width: 100%;
        padding: 28px;
      }

      .wide-card { width: 100%; }

      .hero-card {
        padding: clamp(22px, 3vw, 30px);
        background: var(--surface-hero);
        position: relative;
        overflow: hidden;
      }

      .hero-card::after {
        content: "";
        position: absolute;
        inset: auto -12% -34% auto;
        width: 280px;
        height: 280px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(85, 96, 201, 0.14), transparent 66%);
        pointer-events: none;
      }

      .hero-grid,
      .panel-grid,
      .dashboard-top-grid,
      .dashboard-bottom-grid,
      .dashboard-priority-grid,
      .manager-grid,
      .status-grid,
      .kpi-grid,
      .report-grid,
      .recap-grid,
      .summary-grid,
      .signal-grid,
      .section-grid,
      .module-grid {
        display: grid;
        gap: var(--space-4);
      }

      .hero-grid {
        position: relative;
        z-index: 1;
      }

      .hero-copy {
        display: grid;
        gap: 12px;
        max-width: 840px;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: #aeb9ff;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        font-size: 0.69rem;
        font-weight: 820;
      }

      .hero-subtitle {
        max-width: 700px;
        font-size: 0.98rem;
        color: var(--muted);
        line-height: 1.5;
      }

      .hero-strip {
        display: grid;
        gap: 12px;
        grid-template-columns: 1.4fr repeat(2, minmax(0, 1fr));
        margin-top: 12px;
      }

      .signal-card,
      .summary-card,
      .memo-card,
      .module-card,
      .priority-panel,
      .question-block,
      .assignment-card,
      .status-card,
      .control-strip,
      .command-band,
      .milwaukee-spine__panel {
        border-radius: var(--radius-md);
        padding: 18px;
      }

      .signal-card {
        background: linear-gradient(180deg, rgba(16, 20, 28, 0.98), rgba(10, 12, 18, 0.98));
        min-height: 124px;
        display: grid;
        gap: 8px;
        align-content: start;
      }

      .signal-card--lead {
        background:
          linear-gradient(180deg, rgba(18, 22, 32, 0.99), rgba(10, 12, 18, 0.99)),
          linear-gradient(90deg, rgba(85, 96, 201, 0.14), transparent 38%);
        border-color: rgba(124, 137, 238, 0.2);
      }

      .signal-card__label,
      .kpi-card__label,
      .section-meta,
      .module-card__label,
      .summary-card__label {
        color: var(--muted-2);
        font-size: 0.68rem;
        font-weight: 780;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .signal-card__value,
      .kpi-card__value,
      .metric-emphasis {
        color: var(--text);
        font-size: clamp(1.8rem, 3vw, 2.8rem);
        font-weight: 690;
        line-height: 0.92;
        letter-spacing: -0.055em;
        font-variant-numeric: tabular-nums;
      }

      .signal-card__detail,
      .summary-card__detail,
      .module-card__detail {
        color: var(--muted);
        font-size: 0.96rem;
      }

      .question-block {
        display: grid;
        gap: 12px;
        background: linear-gradient(180deg, rgba(17, 21, 31, 0.94), rgba(11, 14, 22, 0.98));
      }

      .graph-grid {
        align-items: start;
      }

      .graph-panel {
        gap: 18px;
      }

      .graph-bar-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        gap: 14px;
      }

      .graph-bar-card {
        display: grid;
        gap: 12px;
        padding: 14px;
        border-radius: 16px;
        border: 1px solid var(--line);
        background: linear-gradient(180deg, rgba(24, 31, 46, 0.95), rgba(15, 19, 29, 0.95));
      }

      .graph-bar-card--good { border-color: rgba(105, 208, 156, 0.22); }
      .graph-bar-card--warning { border-color: rgba(255, 207, 120, 0.22); }
      .graph-bar-card--bad { border-color: rgba(255, 143, 143, 0.22); }

      .graph-svg {
        width: 100%;
        height: 112px;
      }

      .graph-svg__track {
        fill: rgba(255, 255, 255, 0.06);
        stroke: rgba(255, 255, 255, 0.08);
      }

      .graph-svg__fill--good { fill: rgba(105, 208, 156, 0.92); }
      .graph-svg__fill--warning { fill: rgba(255, 207, 120, 0.92); }
      .graph-svg__fill--bad { fill: rgba(255, 143, 143, 0.92); }

      .graph-bar-copy {
        display: grid;
        gap: 6px;
      }

      .graph-bar-copy strong {
        font-size: 1.3rem;
        letter-spacing: -0.04em;
        font-variant-numeric: tabular-nums;
      }

      .graph-bar-copy p {
        font-size: 0.88rem;
      }

      .stack,
      .compact-stack,
      .section-stack,
      .metric-stack {
        display: grid;
        gap: 12px;
      }

      .section-stack {
        gap: var(--space-5);
      }

      .no-margin { margin: 0; }
      .helper { color: var(--muted); font-size: 0.92rem; }

      .action-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .button-link,
      button {
        appearance: none;
        border: 1px solid rgba(133, 148, 255, 0.22);
        border-radius: 14px;
        min-height: 48px;
        padding: 0 18px;
        font: inherit;
        font-weight: 700;
        letter-spacing: -0.01em;
        transition: transform 140ms ease, border-color 140ms ease, background 140ms ease, color 140ms ease, box-shadow 140ms ease;
      }

      button {
        cursor: pointer;
        width: 100%;
        color: #f7f9ff;
        background: linear-gradient(180deg, #7282ff, #5868ea);
        box-shadow: 0 10px 26px rgba(61, 75, 173, 0.36);
      }

      .button-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: auto;
        color: var(--text);
        background: rgba(255, 255, 255, 0.03);
        box-shadow: var(--shadow-1);
      }

      .button-link--small,
      .button-small {
        min-height: 42px;
        padding: 0 14px;
        border-radius: 12px;
      }

      .button-link--primary,
      .dashboard-execute,
      .button-primary {
        background: linear-gradient(180deg, #7382ff, #5667f0);
        color: #f7f9ff;
        border-color: rgba(149, 160, 255, 0.4);
        box-shadow: 0 16px 34px rgba(61, 75, 173, 0.34);
      }

      .button-secondary {
        background: rgba(255, 255, 255, 0.03);
        color: var(--text);
      }

      .button-link:hover,
      button:hover {
        transform: translateY(-1px);
        border-color: rgba(166, 177, 255, 0.38);
      }

      .button-link:focus-visible,
      button:focus-visible,
      select:focus-visible,
      textarea:focus-visible,
      input:focus-visible {
        outline: 2px solid rgba(140, 163, 255, 0.88);
        outline-offset: 2px;
      }

      select,
      button,
      input,
      textarea {
        width: 100%;
      }

      select,
      input,
      textarea {
        min-height: 48px;
        border-radius: 14px;
        border: 1px solid var(--line-strong);
        background: rgba(255, 255, 255, 0.035);
        color: var(--text);
        padding: 12px 14px;
        font: inherit;
      }

      textarea {
        resize: vertical;
      }

      .picker,
      .report-grid {
        margin-top: var(--space-5);
        display: grid;
        gap: 14px;
      }

      .assignment-card {
        display: grid;
        gap: 10px;
        background: linear-gradient(180deg, rgba(21, 26, 38, 0.94), rgba(13, 17, 25, 0.98));
      }

      .assignment-card--inactive {
        background: linear-gradient(180deg, rgba(30, 22, 19, 0.92), rgba(17, 13, 12, 0.98));
        border-color: rgba(255, 207, 120, 0.18);
      }

      .assignment-card__header,
      .section-header,
      .module-card__header,
      .summary-card__header,
      .panel-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 14px;
      }

      .status-pill--green { color: #b6efcb; background: var(--good-soft); }
      .status-pill--yellow { color: #ffe2a8; background: var(--warn-soft); }
      .status-pill--red { color: #ffc1c1; background: var(--bad-soft); }
      .status-pill--active { color: #b6efcb; background: var(--good-soft); }
      .status-pill--inactive { color: #ffe2a8; background: var(--warn-soft); }

      .dashboard-shell,
      .review-shell,
      .recap-shell,
      .detail-shell {
        display: grid;
        gap: var(--space-5);
      }

      .dashboard-top-grid,
      .report-grid,
      .summary-grid,
      .dashboard-priority-grid,
      .section-grid,
      .module-grid {
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      }

      .dashboard-bottom-grid,
      .status-grid,
      .signal-grid,
      .kpi-grid {
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      }

      .kpi-card {
        display: grid;
        gap: 10px;
        min-height: 148px;
        padding: 20px;
        border-radius: var(--radius-lg);
        background: linear-gradient(180deg, rgba(19, 24, 37, 0.96), rgba(11, 14, 22, 0.98));
      }

      .kpi-card--good { border-color: rgba(105, 208, 156, 0.24); }
      .kpi-card--warning { border-color: rgba(255, 207, 120, 0.24); }
      .kpi-card--accent { border-color: rgba(110, 124, 255, 0.24); }

      .kpi-card__subtext {
        color: var(--muted);
        font-size: 0.92rem;
      }

      .executive-brief {
        background: linear-gradient(180deg, rgba(28, 33, 48, 0.98), rgba(13, 16, 24, 0.98));
      }

      .brief-list,
      .bullet-list {
        margin: 0;
        padding-left: 18px;
        display: grid;
        gap: 10px;
      }

      .bullet-list li,
      .brief-list li {
        color: var(--text);
        line-height: 1.55;
      }

      .brief-list li::marker,
      .bullet-list li::marker {
        color: var(--accent-2);
      }

      .rollup-band {
        padding: 24px;
        border-radius: 22px;
        background:
          linear-gradient(90deg, rgba(85, 96, 201, 0.14), transparent 22%),
          linear-gradient(180deg, rgba(12, 16, 23, 0.99), rgba(8, 10, 15, 0.99));
        border: 1px solid rgba(124, 137, 238, 0.18);
        box-shadow: var(--shadow-1), var(--shadow-3);
      }

      .control-strip {
        display: grid;
        gap: 18px;
        padding: 18px;
        border-radius: 18px;
        background: linear-gradient(180deg, rgba(10, 13, 19, 0.98), rgba(8, 10, 15, 0.98));
      }

      .control-strip__meta {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .control-strip__cluster {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
      }

      .command-band {
        display: grid;
        gap: 18px;
        grid-template-columns: minmax(0, 1.4fr) minmax(320px, 0.9fr);
        margin-top: 18px;
      }

      .command-band__story {
        display: grid;
        gap: 16px;
      }

      .command-band__headline {
        display: grid;
        gap: 10px;
      }

      .command-band__headline h1 {
        max-width: 12ch;
        margin: 0;
      }

      .command-band__grid {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .command-band__actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .command-band__aside {
        display: grid;
        gap: 12px;
        align-content: start;
      }

      .kpi-rail {
        display: grid;
        gap: 12px;
        grid-template-columns: 1.35fr repeat(3, minmax(0, 1fr));
      }

      .kpi-card--lead {
        background: linear-gradient(180deg, rgba(18, 22, 32, 0.99), rgba(9, 11, 17, 0.99));
        border-color: rgba(124, 137, 238, 0.22);
        min-height: 190px;
      }

      .kpi-card--lead .kpi-card__value {
        font-size: clamp(2.5rem, 4.4vw, 4.2rem);
      }

      .kpi-card__subtext,
      .signal-card__detail,
      .summary-card__detail,
      .module-card__detail {
        color: var(--muted);
        font-size: 0.92rem;
        line-height: 1.5;
      }

      .milwaukee-spine {
        display: grid;
        gap: 14px;
      }

      .milwaukee-spine__grid {
        display: grid;
        gap: 14px;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .milwaukee-spine__panel {
        background: linear-gradient(180deg, rgba(13, 17, 25, 0.99), rgba(8, 10, 15, 0.99));
      }

      .milwaukee-spine__panel--owner {
        border-color: rgba(124, 137, 238, 0.18);
      }

      .milwaukee-spine__title {
        color: var(--text);
        font-size: 1.1rem;
        letter-spacing: -0.03em;
        margin: 0 0 8px;
      }

      .milwaukee-spine__panel p,
      .milwaukee-spine__panel ul {
        margin: 0;
      }

      .milwaukee-spine__panel ul {
        padding-left: 18px;
        display: grid;
        gap: 8px;
      }

      .milwaukee-spine__owner {
        display: grid;
        gap: 8px;
      }

      .milwaukee-spine__owner strong {
        font-size: 1.24rem;
        letter-spacing: -0.04em;
      }

      .milwaukee-spine__consequence {
        color: #dfc090;
      }

      .rollup-grid {
        margin-top: 16px;
        display: grid;
        gap: 14px;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      }

      .rollup-bullet {
        padding: 16px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.025);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      .dashboard-section-block,
      .memo-card {
        background: linear-gradient(180deg, rgba(15, 19, 28, 0.97), rgba(10, 13, 20, 0.98));
      }

      .section-header__title {
        display: grid;
        gap: 6px;
      }

      .section-subline,
      .report-meta {
        color: var(--muted);
        font-size: 0.94rem;
      }

      .priority-panel {
        display: grid;
        gap: 12px;
        min-height: 200px;
      }

      .priority-panel--reported {
        background: linear-gradient(180deg, rgba(20, 26, 39, 0.96), rgba(12, 16, 23, 0.98));
      }

      .priority-panel--ai {
        background: linear-gradient(180deg, rgba(27, 31, 49, 0.96), rgba(14, 16, 25, 0.98));
        border-color: rgba(110, 124, 255, 0.18);
      }

      .status-card {
        min-height: 120px;
        display: grid;
        gap: 10px;
      }

      .assignment-card--status.assignment-card--good,
      .status-card--good {
        border-color: rgba(105, 208, 156, 0.2);
      }

      .assignment-card--status.assignment-card--warning,
      .status-card--warning {
        border-color: rgba(255, 207, 120, 0.2);
      }

      .assignment-card--status.assignment-card--accent,
      .status-card--accent {
        border-color: rgba(110, 124, 255, 0.2);
      }

      .module-card {
        min-height: 220px;
        display: grid;
        gap: 12px;
        align-content: start;
      }

      .module-card--placeholder {
        background:
          linear-gradient(180deg, rgba(18, 23, 33, 0.98), rgba(11, 14, 20, 0.98));
      }

      .module-card--cpo {
        border-color: rgba(255, 207, 120, 0.22);
      }

      .summary-card {
        display: grid;
        gap: 12px;
        min-height: 180px;
      }

      .summary-card--spotlight {
        background: linear-gradient(180deg, rgba(27, 31, 48, 0.98), rgba(14, 17, 26, 0.98));
        border-color: rgba(110, 124, 255, 0.18);
      }

      .summary-card--warning {
        border-color: rgba(255, 207, 120, 0.22);
      }

      .memo-grid {
        display: grid;
        gap: var(--space-4);
      }

      .memo-card {
        padding: 22px;
        border-radius: var(--radius-lg);
      }

      .memo-lead {
        color: var(--text);
        font-size: 1.03rem;
      }

      .report-answer-grid,
      .recap-grid {
        display: grid;
        gap: var(--space-4);
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      }

      .report-answer-card {
        padding: 18px;
        border-radius: var(--radius-md);
        background: linear-gradient(180deg, rgba(19, 24, 36, 0.96), rgba(12, 15, 23, 0.98));
        border: 1px solid var(--line);
        box-shadow: var(--shadow-1);
      }

      .metric-inline {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--muted);
        font-size: 0.92rem;
      }

      .divider {
        width: 100%;
        height: 1px;
        background: linear-gradient(90deg, rgba(255,255,255,0.12), rgba(255,255,255,0));
      }

      .mono {
        font-variant-numeric: tabular-nums;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      }

      @media (min-width: 900px) {
        .manager-grid {
          grid-template-columns: minmax(0, 1.05fr) minmax(0, 1fr);
        }

        .hero-grid--balanced {
          grid-template-columns: minmax(0, 1.3fr) minmax(320px, 0.8fr);
          align-items: start;
        }
      }

      @media (max-width: 899px) {
        .shell {
          padding: 18px;
        }

        .app-topbar {
          border-radius: 18px;
          padding: 14px;
        }

        .card,
        .hero-card {
          padding: 20px;
          border-radius: 20px;
        }

        .hero-strip,
        .command-band,
        .command-band__grid,
        .kpi-rail,
        .milwaukee-spine__grid,
        .dashboard-bottom-grid,
        .status-grid,
        .kpi-grid {
          grid-template-columns: 1fr 1fr;
        }

        .command-band {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 640px) {
        .shell {
          padding: 14px;
        }

        .install-shell {
          align-items: stretch;
          flex-direction: column;
        }

        .app-frame,
        .dashboard-shell,
        .review-shell,
        .recap-shell,
        .detail-shell {
          gap: 16px;
        }

        .hero-strip,
        .command-band,
        .command-band__grid,
        .kpi-rail,
        .milwaukee-spine__grid,
        .dashboard-bottom-grid,
        .status-grid,
        .kpi-grid,
        .dashboard-top-grid,
        .dashboard-priority-grid,
        .report-grid,
        .section-grid,
        .module-grid,
        .report-answer-grid,
        .recap-grid {
          grid-template-columns: 1fr;
        }

        .action-row,
        .command-band__actions {
          flex-direction: column;
        }

        .button-link,
        .button-link--small {
          width: 100%;
        }
      }

      :root {
        --bg: #0d0d0f;
        --bg-2: #151518;
        --surface: rgba(27, 27, 29, 0.94);
        --surface-2: rgba(33, 33, 33, 0.96);
        --surface-3: rgba(42, 42, 46, 0.98);
        --surface-hero: linear-gradient(180deg, rgba(28, 28, 31, 0.98), rgba(16, 16, 18, 0.99));
        --text: #f4f4f5;
        --muted: #adadb8;
        --muted-2: #8a8a94;
        --line: rgba(255, 255, 255, 0.07);
        --line-strong: rgba(255, 255, 255, 0.12);
        --accent: #303f9f;
        --accent-2: #4154c7;
        --accent-soft: rgba(48, 63, 159, 0.22);
        --good: #388e3c;
        --good-soft: rgba(56, 142, 60, 0.16);
        --warn: #f9a825;
        --warn-soft: rgba(249, 168, 37, 0.16);
        --bad: #d32f2f;
        --bad-soft: rgba(211, 47, 47, 0.16);
        --radius-sm: 8px;
        --radius-md: 12px;
        --radius-lg: 18px;
        --radius-xl: 24px;
      }

      html {
        background: linear-gradient(180deg, #101012 0%, #0a0a0c 100%);
      }

      body {
        font-feature-settings: "cv01", "ss03";
      }

      body::before {
        background:
          radial-gradient(circle at 0% 0%, rgba(48, 63, 159, 0.16), transparent 24%),
          radial-gradient(circle at 100% 0%, rgba(211, 47, 47, 0.12), transparent 20%);
        opacity: 0.95;
      }

      .app-topbar,
      .hero-card,
      .card,
      .question-block,
      .assignment-card,
      .kpi-card,
      .module-card,
      .status-card,
      .priority-panel,
      .signal-card,
      .memo-card,
      .summary-card,
      .report-answer-card,
      .rollup-band,
      .rollup-bullet {
        backdrop-filter: none;
      }

      .app-topbar {
        border-radius: 14px;
        background: linear-gradient(180deg, rgba(33, 33, 33, 0.98), rgba(24, 24, 27, 0.98));
        border: 1px solid rgba(255, 255, 255, 0.07);
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.32);
      }

      .brand-lockup__meta,
      .eyebrow,
      .section-meta {
        color: #d0d3ff;
        letter-spacing: 0.16em;
      }

      .hero-card,
      .card {
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.32);
      }

      .hero-card {
        overflow: hidden;
      }

      .hero-card::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(90deg, rgba(48, 63, 159, 0.14), transparent 35%),
          linear-gradient(180deg, transparent, rgba(255, 255, 255, 0.02));
        pointer-events: none;
      }

      .hero-card::after {
        width: 420px;
        height: 420px;
        background: radial-gradient(circle, rgba(48, 63, 159, 0.18), transparent 62%);
        inset: auto -8% -42% auto;
      }

      .question-block,
      .module-card,
      .assignment-card,
      .status-card,
      .priority-panel,
      .rollup-bullet,
      .report-answer-card {
        border-radius: 18px;
        background: linear-gradient(180deg, rgba(31, 31, 34, 0.98), rgba(21, 21, 24, 0.98));
        border: 1px solid rgba(255, 255, 255, 0.06);
        box-shadow: 0 12px 36px rgba(0, 0, 0, 0.22);
      }

      .signal-card {
        border-radius: 16px;
        background: linear-gradient(180deg, rgba(36, 36, 40, 0.98), rgba(24, 24, 28, 0.98));
        border: 1px solid rgba(255, 255, 255, 0.06);
      }

      .signal-card__value,
      .kpi-card__value,
      .graph-bar-copy strong {
        letter-spacing: -0.04em;
      }

      .button-link,
      button,
      select,
      input,
      textarea {
        border-radius: 10px;
      }

      .button-link,
      button {
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: linear-gradient(180deg, rgba(52, 52, 56, 0.98), rgba(28, 28, 31, 0.98));
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
      }

      .button-link--primary,
      button[type='submit'] {
        background: linear-gradient(180deg, #3949ab 0%, #303f9f 100%);
        border-color: rgba(84, 105, 255, 0.45);
      }

      .meta-chip,
      .status-pill,
      .tone-pill {
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.04);
      }

      .meta-chip--accent {
        background: rgba(48, 63, 159, 0.2);
        color: #cdd4ff;
        border-color: rgba(48, 63, 159, 0.35);
      }

      .status-pill--red,
      .status-pill--yellow,
      .status-pill--green {
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
      }

      .graph-bar-card {
        background: linear-gradient(180deg, rgba(34, 34, 38, 0.98), rgba(20, 20, 23, 0.98));
      }

      .graph-svg__track {
        fill: rgba(255, 255, 255, 0.06);
      }

      .graph-svg__fill--accent { fill: #303f9f; }
      .graph-svg__fill--warning { fill: #f9a825; }
      .graph-svg__fill--good { fill: #388e3c; }
      .graph-svg__fill--bad { fill: #d32f2f; }

      .kpi-card {
        position: relative;
        overflow: hidden;
      }

      .kpi-card::before,
      .signal-card::before,
      .rollup-bullet::before,
      .priority-panel::before,
      .module-card::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 3px;
        background: rgba(255, 255, 255, 0.04);
      }

      .kpi-card--accent::before,
      .signal-card--accent::before,
      .priority-panel--ai::before,
      .module-card--cpo::before { background: #303f9f; }
      .kpi-card--warning::before,
      .status-card--warning::before { background: #f9a825; }
      .kpi-card--good::before,
      .status-card--good::before { background: #388e3c; }
      .status-card--bad::before,
      .rollup-bullet--bad::before { background: #d32f2f; }

      .panel-header,
      .section-header,
      .module-card__header,
      .assignment-card__header {
        align-items: start;
      }

      .install-shell {
        border-radius: 12px;
        background: linear-gradient(180deg, rgba(33, 33, 33, 0.98), rgba(22, 22, 24, 0.99));
      }

      .install-shell__eyebrow { color: #cfd4ff; }

      .command-note {
        display: grid;
        gap: 8px;
        padding: 16px 18px;
        border-radius: 14px;
        background: linear-gradient(180deg, rgba(24, 24, 26, 0.98), rgba(15, 15, 17, 0.98));
        border: 1px solid rgba(255, 255, 255, 0.06);
      }

      .command-note__label {
        color: #d0d3ff;
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .command-note__body {
        color: var(--text);
        font-size: 0.98rem;
        line-height: 1.6;
      }

      .topbar-nav {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .topbar-nav .button-link--small {
        min-height: 34px;
      }

      .intake-grid {
        display: grid;
        gap: 18px;
        grid-template-columns: minmax(0, 1.1fr) minmax(0, 0.9fr);
      }

      .intake-tile {
        display: grid;
        gap: 14px;
      }

      .intake-actions {
        display: grid;
        gap: 10px;
      }

      .control-tape {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        margin-top: 22px;
        position: relative;
        z-index: 1;
      }

      .control-tape__item {
        padding: 14px 16px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      .control-tape__label {
        display: block;
        color: var(--muted-2);
        font-size: 0.74rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        margin-bottom: 8px;
      }

      .control-tape__value {
        color: var(--text);
        font-weight: 650;
        font-size: 1.02rem;
      }

      .dashboard-nav-band {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 18px;
      }

      .dashboard-nav-band .meta-chip { min-height: 34px; }

      pre.command-pre {
        margin: 0;
        padding: 22px;
        white-space: pre-wrap;
        font: 500 13px/1.75 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        color: var(--text);
        background: linear-gradient(180deg, rgba(14, 14, 16, 0.99), rgba(19, 19, 22, 0.99));
      }

      @media (max-width: 900px) {
        .intake-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <aside class="install-shell" id="installShell" aria-live="polite" data-ui="install-shell">
      <div class="install-shell__copy">
        <span class="install-shell__eyebrow">Phone shell ready</span>
        <strong class="install-shell__title">Industrial command shell</strong>
        <span class="install-shell__meta">Install this on your phone, launch it like an app, then keep building from there.</span>
      </div>
      <button class="button-link button-link--small install-shell__button" id="installAppButton" type="button">Add to home screen</button>
    </aside>
    {% block body %}{% endblock %}
    <script src="/assets/pwa.js?v=3"></script>
  </body>
</html>
